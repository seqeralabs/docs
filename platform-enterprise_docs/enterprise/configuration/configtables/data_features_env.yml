---
-
  Environment variable:            '`TOWER_DATA_EXPLORER_ENABLED`'
  Description: >
    Enable [Data Explorer](https://docs.seqera.io/platform-cloud/data/data-explorer) in all workspaces. To mount data inside a Studio, you must enable Data Explorer.
  Value:                'Default: `false`'
-
  Environment variable:            '`TOWER_DATA_EXPLORER_CLOUD_DISABLED_WORKSPACES`'
  Description: >
    Disable Data Explorer automatic cloud bucket retrieval per workspace.
  Value:                'Example: `<workspace-id1>,<workspace-id2>`'
# TODO(26.1): not in platform repo's ENVIRONMENT-VARIABLES.md — verify still valid
-
  Environment variable:            '`TOWER_DATA_EXPLORER_CREDENTIALS_TTL`'
  Description: >
    Data Explorer interval to fetch credentials from cloud providers for new buckets.
  Value:                'Default: `20m`'
-
  Environment variable:            '`TOWER_DATA_EXPLORER_LINK_STORE_TTL`'
  Description: >
    Data Explorer cloud bucket cache duration.
  Value:                'Default: `30m`'
-
  Environment variable:            '`TOWER_DATA_EXPLORER_LINK_STORE_BACKOFF`'
  Description: >
    The amount of time that elapses after an error, before a retry attempt is made.
  Value:                'Default: `10m`'
-
  Environment variable:            '`TOWER_DATA_EXPLORER_MAX_RETRIES`'
  Description: >
    The number of retries Data Explorer will attempt to fetch cloud buckets in the event of temporary errors.
  Value:                'Default: `3`'
-
  Environment variable:            '`TOWER_DATA_EXPLORER_LINK_STORE_RETRY_AFTER`'
  Description: >
    The period of time that retry attempts will be made even when max retries has been exceeded.
  Value:                'Default: `1d`'
# TODO(26.1): not in platform repo's ENVIRONMENT-VARIABLES.md — verify still valid
-
  Environment variable:            '`TOWER_CONTENT_MAX_FILE_SIZE`'
  Description: >
    Data Explorer download file size limit. **Increasing this value may degrade performance.**
  Value:                'Default: `25MB`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_CONNECT_URL`'
  Description: >
    The URL of the Studios connect proxy. The connect proxy is used internally by Seqera Platform. See [Studios deployment](../install-studios).
  Value:                'Example: `https://connect.example.com/`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_WAVE_CUSTOM_IMAGE_REPOSITORY`'
  Description: >
    The custom image repository for Wave containers. Ignored if custom image registry is not present.
  Value:                'Default: `data-studios/<tool>`'
# TODO(26.1): default conflict between docs and platform manifest — needs Studios team confirmation
-
  Environment variable:            '`TOWER_DATA_STUDIO_WAVE_CUSTOM_IMAGE_NAME_STRATEGY`'
  Description: >
    The custom image name strategy for Wave containers. See the [Wave documentation](https://docs.seqera.io/wave/configuration#container-registry) for available options.
  Value:                'Default: `imageSuffix`'
# TODO(26.1): default conflict between docs and platform manifest — needs Studios team confirmation
-
  Environment variable:            '`TOWER_DATA_STUDIO_WAVE_CUSTOM_IMAGE_REGISTRY`'
  Description: >
    The custom image registry for Wave containers, used as the destination for Studio images that are customized with a conda environment.
  Value:                'Default: `docker.io`'
-
  Environment variable:            '`TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN`'
  Description: >
    An access token used to register new clients in Seqera Platform. Any alphanumeric value is allowed.
    See [Studios deployment](../install-studios). Requires the OIDC provider to be configured. See [Cryptographic options](#cryptographic-options).
  Value:                '`d5XDoRzHpWo1c............mDnfBp`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_ENABLE_PATH_ROUTING`'
  Description: >
    Add this variable and set it to `true` to configure Studios requests to use path-based routing and a single, fixed domain for Studio sessions. See [Studios deployment](../install-studios).
  Value:                'Default: null'
-
  Environment variable:            '`TOWER_OIDC_PEM_PATH`'
  Description: >
    The file path to a PEM certificate used to sign the OIDC tokens for the OpenID connect provider. See [Studios deployment](../install-studios).
  Value:                'Example: `/data-studios-rsa.pem`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_SSH_ALLOWED_WORKSPACES`'
  Description: >
    Add this variable to enable SSH connection functionality in Studios. Set to comma-separated workspace IDs to enable for specific workspaces, an empty string ("") to enable for all workspaces, or `null` to disable for all workspaces. See [Studios deployment](../install-studios) for configuration details.
  Value:                'Default: null'
-
  Environment variable:            '`TOWER_SSH_KEYS_MANAGEMENT_ENABLED`'
  Description: >
    Enable SSH key management for Studios SSH connection functionality.
  Value:                'Default: false'
-
  Environment variable:            '`TOWER_DATA_STUDIO_CONNECT_SSH_KEY_FINGERPRINT`'
  Description: >
    SSH key fingerprint. This allows only SSH connections that have been authenticated with Seqera to connect to the server and is recommended for production environments. To generate the fingerprint, use `ssh-keygen -lf <path-to-ssh-key>`. See [Studios deployment](../install-studios).
  Value:                'Example: `SHA256:uNiVztksCsDhcc0u9e8BujQXVUpKZIDTMczCvj3tD2s`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_CONNECT_SSH_PORT`'
  Description: >
    	Connection string display purposes.
  Value:                'Default: `22`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_CONNECT_SSH_ADDRESS`'
  Description: >
    	This is set only if the SSH server runs on a different domain to the Connect proxy.
  Value:                'Example: `ssh.example.com`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_ALLOWED_WORKSPACES`'
  Description: >
    Control which workspaces have Studios enabled. Leave unset (default) to enable Studios in all workspaces, set to an empty string to disable Studios for all workspaces, or provide a comma-separated list of workspace IDs to enable Studios only in those workspaces.
  Value:                'Default: Enabled for all workspaces'
-
  Environment variable:            '`TOWER_DATA_STUDIO_DEFAULT_LIFESPAN`'
  Description: >
    Default lifespan in hours for Studios when no workspace-specific settings are configured.
  Value:                'Default: `8`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_PRIVATE_STUDIO_BY_DEFAULT`'
  Description: >
    Default privacy setting for Studios when no workspace-specific or Studio-specific settings are configured. Set to `true` to make Studios private by default; the default value (`false`) makes Studios collaborative unless overridden on creation.
  Value:                'Default: `false`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_LIST_MAX_ALLOWED`'
  Description: >
    Maximum and default number of items returned in a single page when listing Studios.
  Value:                'Default: `100`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_FEATURE_MANIFEST_URL`'
  Description: >
    The manifest URL used for feature version compatibility checks of Studio clients.
  Value:                'Example: `https://example.com/manifest.json`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_CONNECT_IFRAME_ALLOWED_WORKSPACES`'
  Description: >
    Control which workspaces have the Studio iframe in Connect enabled. Set to `null` (undefined) to disable for all workspaces, set to an empty string to enable for all workspaces, or provide a comma-separated list of workspace IDs to enable per workspace.
  Value:                'Default: null'
-
  Environment variable:            '`TOWER_DATA_STUDIO_WAVE_STATUS_CHECK_INITIAL_DELAY`'
  Description: >
    Initial delay before the job that checks Wave build status for Studios in building status runs for the first time.
  Value:                'Default: `5s`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_WAVE_STATUS_CHECK_RATE`'
  Description: >
    Fixed rate at which Wave build status is checked for Studios in building status.
  Value:                'Default: `30s`'
-
  Environment variable:            '`TOWER_DATA_STUDIO_WAVE_DISALLOWED_REGISTRIES`'
  Description: >
    Comma-separated list of registry URLs that are not allowed as build destinations for dockerfile-based Studio images. Registries in this list won't be used for pushing dockerfile builds.
  Value:                'Default: `community.wave.seqera.io`'
-
  Environment variable:            '`TOWER_STUDIO_METRICS_ENABLED_WORKSPACES`'
  Description: >
    Control which workspaces have Studio startup metrics collection enabled. Set to `null` (undefined) to disable for all workspaces, set to an empty string to enable for all workspaces, or provide a comma-separated list of workspace IDs to enable per workspace.
  Value:                'Default: null'
-
  Environment variable:            '`TOWER_STUDIO_METRICS_RETENTION_DAYS`'
  Description: >
    Number of days to retain Studio startup metrics in the database before automatic deletion. Metrics older than this threshold are deleted by a daily scheduled job.
  Value:                'Default: `90`'
