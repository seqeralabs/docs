[[edge_functions]]
  function = "og-generate.png"
  path = "/og-generate.png"

[build]
  trailingSlash = true
  # TEMP DIAGNOSTIC: print the build container's real memory cap before building.
  # Inside Netlify containers `free`/`nproc`/os.totalmem() report the HOST, not the
  # enforced cgroup limit — and the cgroup cap is what triggers 137 OOM kills. This
  # logs both so we can tune SSG concurrency/threads against the true cap. Remove
  # once captured.
  command = "echo '--- cgroup mem cap (bytes) ---'; cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null; echo '--- host view (misleading inside container) ---'; nproc; free -h; npm run build"

[build.environment]
  NODE_VERSION = "22"
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Limit SSG worker threads to prevent OOM errors in Netlify builds
  # Docusaurus defaults to 32 threads with 1GB memory each, but Netlify's
  # memory limits aren't properly enforced, causing out-of-memory 137 errors.
  # Limiting thread processing avoids this issue with some build time impact however,
  # build are still significantly faster than without SSG in-use.
  # Reference: https://github.com/facebook/docusaurus/discussions/11199
  DOCUSAURUS_SSG_WORKER_THREAD_COUNT = "1"

[context.deploy-preview.build.environment]
  INCLUDE_NEXT=""
  EXCLUDE_CHANGELOG=""
  EXCLUDE_PLATFORM_CLI="true"
  EXCLUDE_PLATFORM_ENTERPRISE=""
  # EXCLUDE_PLATFORM_API gates the API content plugin, the OpenAPI preset, and
  # the llms-api plugin together. Set to "true" because the API docs are too
  # large to build/host on Netlify and are offloaded to the separate
  # seqera-docs-api site (see the /platform-api/* redirect below).
  EXCLUDE_PLATFORM_API="true"
  EXCLUDE_MULTIQC=""
  EXCLUDE_WAVE="true"

# Asset and image routing handled by Edge Function
# See netlify/edge-functions/asset-proxy.js
[[edge_functions]]
  function = "asset-proxy"
  path = "/assets/*"

[[edge_functions]]
  function = "asset-proxy"
  path = "/img/*"

[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [
      "node_modules/.cache",
      ".docusaurus"
    ]

[[redirects]]
  from = "/platform-api/*"
  to = "https://seqera-docs-api.netlify.app/platform-api/:splat"
  status = 200

[[redirects]]
  from = "/nextflow/*"
  to = "https://docs-migration.netlify.app/nextflow/:splat"
  status = 200
