[[edge_functions]]
  function = "og-generate.png"
  path = "/og-generate.png"

[build]
  trailingSlash = true

[build.environment]
  NODE_VERSION = "22"
  # Per-process V8 heap ceiling. Build VM has ~10 GiB RAM / 6 vCPUs.
  NODE_OPTIONS = "--max-old-space-size=4096"
  # SSG worker-thread pool (enabled by ssgWorkerThreads in docusaurus.config.js).
  # Cap workers and recycle each past ~1.5 GB to bound peak memory under the VM's
  # ~10 GiB. Recycler: https://github.com/facebook/docusaurus/pull/11166
  DOCUSAURUS_SSG_WORKER_THREAD_COUNT = "4"
  DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY = "1500000000"
  DOCUSAURUS_SSG_WORKER_THREAD_TASK_SIZE = "8"
  # Drop Rspack incremental-compilation state to trim peak bundler memory; no
  # downside on cold CI builds. Read by @docusaurus/core webpack/base.js.
  DISABLE_RSPACK_INCREMENTAL = "true"

[context.deploy-preview.build.environment]
  # Lean preview scope. platform-api is excluded because building it OOMs (137)
  # during Rspack bundling on the build VM; it's offloaded to the seqera-docs-api
  # site and served via the non-forced /platform-api/* proxy below. CLI is
  # excluded to keep previews fast.
  INCLUDE_NEXT=""
  EXCLUDE_CHANGELOG=""
  EXCLUDE_PLATFORM_CLI="true"
  EXCLUDE_PLATFORM_ENTERPRISE=""
  EXCLUDE_PLATFORM_API="true"
  EXCLUDE_MULTIQC=""

# Asset and image routing handled by Edge Function
# See netlify/edge-functions/asset-proxy.js
[[edge_functions]]
  function = "asset-proxy"
  path = "/assets/*"

[[edge_functions]]
  function = "asset-proxy"
  path = "/img/*"

[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [
      "node_modules/.cache",
      ".docusaurus"
    ]

[[redirects]]
  from = "/platform-api/*"
  to = "https://seqera-docs-api.netlify.app/platform-api/:splat"
  status = 200

[[redirects]]
  from = "/nextflow/*"
  to = "https://docs-migration.netlify.app/nextflow/:splat"
  status = 200
