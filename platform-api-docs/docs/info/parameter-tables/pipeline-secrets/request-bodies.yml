- Name: "**CreatePipelineSecret**"
  Type: ""
  Req/Opt: ""
  Description: Create pipeline secret
- Name: name
  Type: string
  Req/Opt: Optional
  Description: Secret name used by Nextflow when resolving this pipeline secret.
- Name: value
  Type: string
  Req/Opt: Optional
  Description: Secret value stored securely for use in pipeline launches.
- Name: "**UpdatePipelineSecret**"
  Type: ""
  Req/Opt: ""
  Description: Update secret
- Name: value
  Type: string
  Req/Opt: Optional
  Description: Updated secret value stored securely for future pipeline launches.
