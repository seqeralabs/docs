- Name: "**CreateDatasetV2**"
  Type: ""
  Req/Opt: ""
  Description: Create dataset
- Name: name
  Type: string
  Req/Opt: Optional
  Description: Name for the new dataset.
- Name: description
  Type: string
  Req/Opt: Optional
  Description: Optional description of the dataset purpose and contents.
- Name: sourceType
  Type: string
  Req/Opt: Optional
  Description: Dataset source type. Accepts `UPLOADED` for uploaded dataset files
    or `LINKED` for externally linked dataset URLs.
- Name: "**DeleteDatasets**"
  Type: ""
  Req/Opt: ""
  Description: Delete datasets
- Name: datasetIds
  Type: array
  Req/Opt: Optional
  Description: Array of dataset string identifiers to delete.
- Name: "**UpdateDatasetV2**"
  Type: ""
  Req/Opt: ""
  Description: Update dataset
- Name: name
  Type: string
  Req/Opt: Optional
  Description: Updated dataset name.
- Name: description
  Type: string
  Req/Opt: Optional
  Description: Updated description of the dataset contents and purpose.
