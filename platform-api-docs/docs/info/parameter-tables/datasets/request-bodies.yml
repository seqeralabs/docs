- Name: "**PreviewDatasetUrl**"
  Type: ""
  Req/Opt: ""
  Description: Preview content from a URL
- Name: url
  Type: string
  Req/Opt: Optional
  Description: HTTP or HTTPS URL to validate. Maximum length is 2048 characters.
- Name: "**ValidateDatasetUrl**"
  Type: ""
  Req/Opt: ""
  Description: Validate URL for dataset linking
- Name: url
  Type: string
  Req/Opt: Optional
  Description: HTTP or HTTPS URL to validate. Maximum length is 2048 characters.
- Name: "**LinkDatasetVersion**"
  Type: ""
  Req/Opt: ""
  Description: Link external URL as dataset version
- Name: hasHeader
  Type: boolean
  Req/Opt: Optional
  Description: When true, treats the first row of the linked CSV or TSV file as a
    header row. Defaults to `true`.
- Name: url
  Type: string
  Req/Opt: Optional
  Description: HTTP or HTTPS URL pointing to a public CSV or TSV file. Maximum
    length is 2048 characters.
