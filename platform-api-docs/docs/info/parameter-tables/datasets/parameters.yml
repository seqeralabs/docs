- Name: "`workspaceId`"
  Type: integer
  Location: query
  Req/Opt: Optional
  Description: Workspace numeric identifier. If omitted, lists datasets in a user context.
- Name: "`max`"
  Type: integer
  Location: query
  Req/Opt: Optional
  Description: Maximum number of results to return per page.
- Name: "`offset`"
  Type: integer
  Location: query
  Req/Opt: Optional
  Description: "Number of results to skip for pagination. Default: `0`."
- Name: "`search`"
  Type: string
  Location: query
  Req/Opt: Optional
  Description: Free-text search filter to match against dataset names and descriptions.
- Name: "`sortBy`"
  Type: string
  Location: query
  Req/Opt: Optional
  Description: "Field to sort results by. Accepts `name`, `modified`, or `used`.
    Default: `name`."
- Name: "`sortDir`"
  Type: string
  Location: query
  Req/Opt: Optional
  Description: "Sort direction for results. Accepts `asc` (ascending) or `desc`
    (descending). Default: `asc`."
- Name: "`visibility`"
  Type: string
  Location: query
  Req/Opt: Optional
  Description: "Dataset visibility filter. Accepts `visible`, `hidden`, or `all`.
    Default: `visible`."
- Name: "`attributes`"
  Type: array
  Location: query
  Req/Opt: Optional
  Description: Additional attribute values to include in the response. Accepts
    `labels`. Returns `null` for omitted attributes.
- Name: "`mimeType`"
  Type: string
  Location: query
  Req/Opt: Optional
  Description: Dataset MIME type filter (e.g., `text/csv`, `text/tab-separated-values`).
- Name: "`datasetId`"
  Type: string
  Location: path
  Req/Opt: Required
  Description: Dataset string identifier.
- Name: "`header`"
  Type: boolean
  Location: query
  Req/Opt: Optional
  Description: "Indicates whether the uploaded file contains a header row. Default: `true`."
- Name: "`version`"
  Type: string
  Location: path
  Req/Opt: Required
  Description: Dataset version number.
- Name: "`fileName`"
  Type: string
  Location: path
  Req/Opt: Required
  Description: File name for the downloaded dataset content. Must match the
    original uploaded filename.
- Name: "`launchId`"
  Type: string
  Location: path
  Req/Opt: Required
  Description: Launch string identifier.
- Name: "`workspaceId`"
  Type: integer
  Location: path
  Req/Opt: Required
  Description: Workspace numeric identifier
