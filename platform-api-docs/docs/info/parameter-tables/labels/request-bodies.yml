- Name: "**CreateLabel**"
  Type: ""
  Req/Opt: ""
  Description: Create label
- Name: name
  Type: string
  Req/Opt: Optional
  Description: Label key name.
- Name: value
  Type: string
  Req/Opt: Optional
  Description: Label value.
- Name: resource
  Type: boolean
  Req/Opt: Optional
  Description: Set to true to create a resource label.
- Name: isDefault
  Type: boolean
  Req/Opt: Optional
  Description: Set to true to automatically apply this label to new resources.
- Name: "**UpdateLabel**"
  Type: ""
  Req/Opt: ""
  Description: Update label
- Name: name
  Type: string
  Req/Opt: Optional
  Description: Updated label key name.
- Name: value
  Type: string
  Req/Opt: Optional
  Description: Updated label value.
- Name: isDefault
  Type: boolean
  Req/Opt: Optional
  Description: If `true`, automatically applies this label to new resources in the
    same scope.
