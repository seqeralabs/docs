    update: "Deletes the compute environment identified by the given `computeEnvId`. When `force=true`, bypasses active-job checks and SCMS/forge cleanup; only allowed for environments in ERRORED, INVALID, or DELETING status."
  - target: $["paths"]["/compute-envs/{computeEnvId}"]["delete"]["parameters"]
    update:
      - description: "Force-delete a stuck compute environment, bypassing active-job checks. Only valid for environments in ERRORED, INVALID, or DELETING status."
        in: query
        name: force
        schema:
          type: boolean
  - target: $["paths"]
    update:
      /compute-envs/{computeEnvId}/validate:
        post:
          description: Re-runs the pre-flight checks (associated-credential validation and work-directory accessibility) for the compute environment identified by the given `computeEnvId` and persists the outcome to the compute environment and its credential. Intended to recover a compute environment marked `INVALID` after the underlying problem has been fixed. Available only while the pre-flight feature is enabled.
          operationId: ValidateComputeEnv
          parameters:
            - description: Compute environment string identifier
              in: path
              name: computeEnvId
              required: true
              schema:
                type: string
            - description: Workspace numeric identifier
              in: query
              name: workspaceId
              schema:
                format: int64
                type: integer
            - description: "When true, skip the credential and work-dir checks and force the compute environment (INVALID only, with an AVAILABLE credential) to AVAILABLE. Rejected with 409 otherwise."
              in: query
              name: force
              required: false
              schema:
                type: boolean
          requestBody:
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/EmptyBodyRequest"
          responses:
            "200":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ValidateComputeEnvResponse"
              description: Validation outcome - inspect status and the transientError flag on the response body
            "400":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
              description: Compute environment is in a status that cannot be validated
            "403":
              description: Operation not allowed
            "404":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
              description: Compute environment not found
            "405":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
              description: Pre-flight feature is disabled
            "409":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
              description: Force override rejected because the compute environment or its associated credential is not in a compatible state
          security:
            - BearerAuth: []
          summary: Validate a compute environment
          tags:
            - compute-envs
  - target: $["paths"]
    update:
      /credentials/{credentialsId}/validate:
        post:
          operationId: ValidateCredentials
          parameters:
            - description: Credentials string identifier
              in: path
              name: credentialsId
              required: true
              schema:
                type: string
            - description: Workspace numeric identifier
              in: query
              name: workspaceId
              required: false
              schema:
                format: int64
                type: integer
            - description: "When true, skip the probe and force the credential (INVALID only) to AVAILABLE. Rejected with 409 for any other status."
              in: query
              name: force
              required: false
              schema:
                type: boolean
          responses:
            "200":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ValidateCredentialsResponse"
              description: Validation outcome — inspect status and the transientError flag on the response body
            "400":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
              description: Bad request
            "403":
              description: Operation not allowed
            "404":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
              description: Credentials not found
            "409":
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
              description: Force override rejected — credential is not INVALID
          security:
            - BearerAuth: []
          summary: Validate credentials against their cloud provider and report the outcome
          tags:
            - credentials
