        type: string
  - target: $["components"]["schemas"]
    update:
      WesServiceInfo:
        type: object
        properties:
          workflow_type_versions:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/WorkflowTypeVersion"
          supported_wes_versions:
            type: array
            items:
              type: string
          supported_filesystem_protocols:
            type: array
            items:
              type: string
          workflow_engine_versions:
            type: object
            additionalProperties:
              type: string
          default_workflow_engine_parameters:
            type: array
            items:
              $ref: "#/components/schemas/DefaultWorkflowEngineParameter"
          system_state_counts:
            type: object
            additionalProperties:
              type: integer
              format: int64
          auth_instructions_url:
            type: string
          contact_info_url:
            type: string
          tags:
            type: object
            additionalProperties:
              type: string
  - target: $["components"]["schemas"]
    update:
      WorkflowTypeVersion:
        type: object
        properties:
          workflow_type_version:
            type: array
            items:
              type: string
