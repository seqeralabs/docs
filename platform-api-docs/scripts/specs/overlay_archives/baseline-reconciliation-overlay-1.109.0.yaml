overlay: 1.0.0
info:
  title: Baseline reconciliation overlay for Seqera Platform API v1.109.0
  version: 1.109.0
actions:
- target: $.paths
  update:
    /compute-envs/{computeEnvId}/enable:
      post:
        tags:
        - compute-envs
        summary: Enable compute environment
        description: Enables the compute environment identified by the given `computeEnvId`. An enabled compute environment can be used to launch workflows.
        operationId: EnableComputeEnv
        parameters:
        - name: computeEnvId
          in: path
          description: Compute environment alphanumeric identifier.
          schema:
            type: string
          required: true
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          description: Empty request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyBodyRequest'
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /compute-envs/{computeEnvId}/disable:
      post:
        tags:
        - compute-envs
        summary: Disable compute environment
        description: Disables the compute environment identified by the given `computeEnvId`. A disabled compute environment cannot be used to launch workflows. If the compute environment is primary, it is automatically unset as primary.
        operationId: DisableComputeEnv
        parameters:
        - name: computeEnvId
          in: path
          description: Compute environment alphanumeric identifier.
          schema:
            type: string
          required: true
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          description: Empty request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyBodyRequest'
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /datasets:
      delete:
        tags:
        - datasets
        summary: Delete datasets
        description: Deletes the datasets identified by the provided `datasetIds`. Append `?workspaceId` to delete datasets in a workspace context.
        operationId: DeleteDatasets
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDatasetsRequest'
          required: true
          description: Dataset bulk-delete request.
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DeleteDatasetsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '204':
            description: DeleteDatasets 204 response
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DeleteDatasetsResponse'
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /datasets/hide:
      post:
        tags:
        - datasets
        summary: Hide datasets
        description: Hides the datasets identified by the provided `datasetIds`. Hidden datasets are excluded from default list results unless `visibility` is adjusted.
        operationId: HideDatasets
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          description: Dataset visibility update request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeDatasetVisibilityRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /datasets/show:
      post:
        tags:
        - datasets
        summary: Show datasets
        description: Shows the datasets identified by the provided `datasetIds`, making them visible in default list results again.
        operationId: ShowDatasets
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          description: Dataset visibility update request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeDatasetVisibilityRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /datasets/labels/add:
      post:
        tags:
        - labels
        summary: Add labels to datasets
        description: Adds the specified simple labels to the datasets identified by `datasetIds`. Existing labels are preserved.
        operationId: AddLabelsToDatasets
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          description: Dataset labels add request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssociateDatasetsLabelsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /datasets/labels/apply:
      post:
        tags:
        - labels
        summary: Replace dataset labels
        description: Replaces the labels applied to the datasets identified by `datasetIds`. Include all labels to preserve in `labelIds`.
        operationId: ApplyLabelsToDatasets
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          description: Dataset labels replace request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssociateDatasetsLabelsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '403':
            description: Operation not allowed
          '400':
            description: Invalid request, if trying to associate resource labels
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /datasets/labels/remove:
      post:
        tags:
        - labels
        summary: Remove labels from datasets
        description: Removes the specified labels from the datasets identified by `datasetIds`.
        operationId: RemoveLabelsFromDatasets
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        requestBody:
          description: Dataset labels remove request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssociateDatasetsLabelsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.paths
  update:
    /datasets/{datasetId}/versions/{version}/disable:
      post:
        tags:
        - datasets
        summary: Disable dataset version
        description: Disables the specified dataset version. Disabled dataset versions cannot be used in workflow runs and cannot be re-enabled.
        operationId: DisableDatasetVersion
        parameters:
        - name: datasetId
          in: path
          description: Dataset string identifier.
          schema:
            type: string
          required: true
        - name: version
          in: path
          description: Dataset version number to disable.
          schema:
            type: integer
            format: int64
          required: true
        - name: workspaceId
          in: query
          description: Workspace numeric identifier.
          schema:
            type: integer
            format: int64
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.paths./compute-envs.get.parameters[*]
  remove: true
- target: $.paths./compute-envs.get.parameters
  update:
  - name: status
    in: query
    description: Compute environment status filter.
    schema:
      type: string
  - name: workspaceId
    in: query
    description: Workspace numeric identifier. If omitted, lists compute environments in a user context.
    schema:
      type: integer
      format: int64
  - name: attributes
    in: query
    description: Additional attribute values to include in the response. Accepts `labels` or `resources`. Returns `null` for omitted attributes.
    schema:
      type: array
      items:
        $ref: '#/components/schemas/ComputeEnvQueryAttribute'
    explode: false
- target: $.paths./compute-envs/{computeEnvId}.get.parameters[?(@.name=='attributes')].description
  update: Additional attribute values to include in the response. Accepts `labels` or `resources`. Returns `null` for omitted attributes.
- target: $.paths./datasets.get.parameters[*]
  remove: true
- target: $.paths./datasets.get.parameters
  update:
  - name: workspaceId
    in: query
    description: Workspace numeric identifier. If omitted, lists datasets in a user context.
    schema:
      type: integer
      format: int64
  - name: max
    in: query
    description: Maximum number of results to return per page.
    schema:
      type: integer
      format: int32
  - name: offset
    in: query
    description: 'Number of results to skip for pagination. Default: `0`.'
    schema:
      type: integer
      format: int32
  - name: search
    in: query
    description: Free-text search filter to match against dataset names and descriptions.
    schema:
      type: string
  - name: sortBy
    in: query
    description: 'Field to sort results by. Accepts `name`, `modified`, or `used`. Default: `name`.'
    schema:
      type: string
  - name: sortDir
    in: query
    description: 'Sort direction for results. Accepts `asc` (ascending) or `desc` (descending). Default: `asc`.'
    schema:
      type: string
  - name: visibility
    in: query
    description: 'Dataset visibility filter. Accepts `visible`, `hidden`, or `all`. Default: `visible`.'
    schema:
      type: string
  - name: attributes
    in: query
    description: Additional attribute values to include in the response. Accepts `labels`. Returns `null` for omitted attributes.
    schema:
      type: array
      items:
        $ref: '#/components/schemas/DatasetQueryAttribute'
    explode: false
- target: $.paths./datasets/{datasetId}/metadata.get.parameters[*]
  remove: true
- target: $.paths./datasets/{datasetId}/metadata.get.parameters
  update:
  - name: workspaceId
    in: query
    description: Workspace numeric identifier.
    schema:
      type: integer
      format: int64
  - name: datasetId
    in: path
    description: Dataset string identifier.
    schema:
      type: string
    required: true
  - name: attributes
    in: query
    description: Additional attribute values to include in the response. Accepts `labels`. Returns `null` for omitted attributes.
    schema:
      type: array
      items:
        $ref: '#/components/schemas/DatasetQueryAttribute'
    explode: false
- target: $.paths./pipelines.get.parameters[*]
  remove: true
- target: $.paths./pipelines.get.parameters
  update:
  - name: attributes
    in: query
    description: 'Additional attribute values to include in the response (`labels`, `optimized` status, `computeEnv`). Returns an empty value (`labels: null`, etc.) if omitted.'
    schema:
      type: array
      items:
        $ref: '#/components/schemas/PipelineQueryAttribute'
    explode: false
  - name: workspaceId
    in: query
    description: Workspace numeric identifier.
    schema:
      type: integer
      format: int64
  - name: max
    in: query
    description: Maximum number of pipelines to return per request.
    schema:
      type: integer
      format: int32
  - name: offset
    in: query
    description: 'Number of results to skip for pagination. Default: `0`.'
    schema:
      type: integer
      format: int32
  - name: sortBy
    in: query
    description: 'Field to sort results by. Accepts `NAME`, `MODIFIED`, or `CREATED`. Default: `NAME`.'
    schema:
      $ref: '#/components/schemas/PipelineListParams.SortBy'
  - name: sortDir
    in: query
    description: 'Sort direction for results. Accepts `ASCENDING` or `DESCENDING`. Default: `ASCENDING`.'
    schema:
      $ref: '#/components/schemas/PipelineListParams.SortDir'
  - name: search
    in: query
    description: Free-text search filter to match against pipeline names and descriptions.
    schema:
      type: string
  - name: visibility
    in: query
    description: Filter pipelines by visibility. Accepts `private`, `shared`, or `all`.
    schema:
      type: string
