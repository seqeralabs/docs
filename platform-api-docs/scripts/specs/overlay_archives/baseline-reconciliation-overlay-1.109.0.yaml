- target: $.components.schemas
  update:
    ComputeEnvQueryAttribute:
      type: string
      description: Optional compute environment response enrichment attribute. Accepts `labels` or `resources`.
      enum:
      - labels
      - resources
      x-enum-varnames:
      - labels
      - resources
    AssociateDatasetsLabelsRequest:
      type: object
      description: Dataset label association request.
      properties:
        datasetIds:
          type: array
          items:
            type: string
          description: Array of dataset string identifiers to update.
        labelIds:
          type: array
          items:
            type: integer
            format: int64
          description: Array of simple label numeric identifiers to add, apply, or remove.
    AzCloudPlatformMetaInfo:
      title: Azure Cloud platform metainfo
      type: object
      description: Azure Cloud platform metadata returned by the platform describe endpoint.
      properties:
        discriminator:
          type: string
          description: Property to select the platform metainfo type.
        warnings:
          type: array
          items:
            type: string
          description: Array of warnings returned for the Azure Cloud platform configuration.
        containers:
          type: array
          items:
            type: string
          description: Array of Azure Blob Storage containers available to the platform context.
        instanceTypes:
          type: array
          items:
            type: string
          description: Array of Azure Cloud instance types available for compute environments.
    AzureCloudKeys:
      title: Azure Cloud credentials
      type: object
      description: Azure Cloud credentials for authenticating to Azure Batch and Azure Storage.
      properties:
        discriminator:
          type: string
          description: Property to select the credentials type.
        batchName:
          type: string
          description: Azure Batch account name.
        storageName:
          type: string
          description: Azure Storage account name.
        batchKey:
          type: string
          writeOnly: true
          description: Azure Batch account access key.
        storageKey:
          type: string
          writeOnly: true
          description: Azure Storage account access key.
        subscriptionId:
          type: string
          description: Azure subscription string identifier.
        tenantId:
          type: string
          description: Azure Entra tenant string identifier.
        clientId:
          type: string
          description: Azure application client string identifier.
        clientSecret:
          type: string
          writeOnly: true
          description: Azure application client secret.
    ChangeDatasetVisibilityRequest:
      type: object
      description: Dataset visibility update request.
      properties:
        datasetIds:
          type: array
          items:
            type: string
          description: Array of dataset string identifiers to show or hide.
    ComputeEnvResources:
      type: object
      description: Estimated resources available to a compute environment.
      properties:
        cpus:
          type: integer
          format: int32
          nullable: true
          description: Number of CPUs available to the compute environment. Can be `null` if the information is not available.
        memory:
          type: integer
          format: int32
          nullable: true
          description: Amount of memory available to the compute environment in GB. Can be `null` if the information is not available.
        gpus:
          type: integer
          format: int32
          nullable: true
          description: Number of GPUs available to the compute environment. Can be `null` if the information is not available.
        diskSize:
          type: integer
          format: int32
          nullable: true
          description: Disk size available to the compute environment in GB. Can be `null` if the information is not available.
        estimatedPrice:
          type: number
          format: float
          nullable: true
          description: Estimated hourly price for the compute environment. Can be `null` if the information is not available.
        instanceType:
          type: string
          nullable: true
          description: Cloud instance type selected for the compute environment. Can be `null` if the information is not available.
    DatasetQueryAttribute:
      type: string
      description: Optional dataset response enrichment attribute. Accepts `labels`.
      enum:
      - labels
      x-enum-varnames:
      - labels
    DatasetRunsInfo:
      type: object
      description: Dataset usage information across workflow runs.
      properties:
        runsCount:
          type: integer
          format: int64
          description: Number of workflow runs that reference the dataset.
        lastUsed:
          type: string
          format: date-time
          description: Timestamp when the dataset was last used by a workflow run.
    DeleteDatasetsRequest:
      type: object
      description: Dataset bulk-delete request.
      properties:
        datasetIds:
          type: array
          items:
            type: string
          description: Array of dataset string identifiers to delete.
    DeleteDatasetsResponse:
      type: object
      description: Result of a dataset bulk-delete request.
      properties:
        success:
          type: array
          items:
            type: string
          description: Array of dataset string identifiers deleted successfully.
        failed:
          type: array
          items:
            type: string
          description: Array of dataset string identifiers that could not be deleted.
    GitKeys:
      type: object
      description: Base Git source code management credentials object.
      properties:
        discriminator:
          type: string
          description: Property to select the credentials type.
        username:
          type: string
          description: Git username, if required by the provider.
        password:
          type: string
          writeOnly: true
          description: Git password or personal access token, if required by the provider.
        token:
          type: string
          writeOnly: true
          description: Provider token for Git integrations that support token-based authentication.
    GoogleLifeSciencesConfig:
      title: Google Life Sciences configuration (retired)
      type: object
      description: Retired Google Life Sciences compute environment configuration retained for existing environments.
      properties:
        workDir:
          type: string
          description: Compute environment working directory
        preRunScript:
          type: string
          description: Add a script that executes in the nf-launch script prior to invoking Nextflow processes. See [Pre and post-run scripts](https://docs.seqera.io/platform-cloud/launch/advanced#pre-and-post-run-scripts).
        postRunScript:
          type: string
          description: Add a script that executes after all Nextflow processes have completed. See [Pre and post-run scripts](https://docs.seqera.io/platform-cloud/launch/advanced#pre-and-post-run-scripts).
        environment:
          type: array
          items:
            $ref: '#/components/schemas/ConfigEnvVariable'
        nextflowConfig:
          type: string
        discriminator:
          type: string
          description: property to select the compute config platform
        region:
          type: string
        zones:
          type: array
          items:
            type: string
        location:
          type: string
        preemptible:
          type: boolean
        bootDiskSizeGb:
          type: integer
          format: int32
        projectId:
          type: string
        sshDaemon:
          type: boolean
        sshImage:
          type: string
        debugMode:
          type: integer
          format: int32
        copyImage:
          type: string
        usePrivateAddress:
          type: boolean
        labels:
          type: object
          additionalProperties:
            type: string
        headJobCpus:
          type: integer
          format: int32
        headJobMemoryMb:
          type: integer
          format: int32
        nfsTarget:
          type: string
        nfsMount:
          type: string
    LocalSecurityKeys:
      title: Local security keys
      type: object
      description: Local credentials used for non-public local platform environments.
      properties:
        discriminator:
          type: string
          description: Property to select the credentials type.
        password:
          type: string
          writeOnly: true
          description: Local platform password.
    SeqeraComputeCloudInstanceTypeSize:
      type: string
      description: Predefined Seqera Compute Data Studio instance size. Accepts `SMALL`, `MEDIUM`, or `LARGE`.
      enum:
      - SMALL
      - MEDIUM
      - LARGE
    StudioRemoteConfiguration:
      required:
      - repository
      type: object
      description: Remote repository configuration used to pre-fill or recreate a Studio session.
      properties:
        repository:
          type: string
          description: Remote repository URL.
        revision:
          type: string
          nullable: true
          description: Optional branch or tag to check out. Can be `null`.
        commitId:
          type: string
          nullable: true
          description: Optional commit hash pinned for the remote repository. Can be `null`.
