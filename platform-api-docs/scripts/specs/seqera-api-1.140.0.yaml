          items:
            $ref: "#/components/schemas/ConfigEnvVariable"
          type: array
        forge:
          $ref: "#/components/schemas/AzBatchForgeConfig"
        fusion2Enabled:
          type: boolean
        headJobCpus:
          description: Number of CPU slots reserved on the head pool VM for the Nextflow
            head job. Defaults to 1 so multiple head jobs can share a head pool VM;
            increase to dedicate more CPU and memory to each head job.
          example: 1
          format: int32
          nullable: true
          type: integer
        headJobMemoryMb:
          description: "Memory in MiB reserved for the Nextflow head job container.\
            \ When omitted, the value is derived from the head pool VM size as the\
            \ per-slot share (vmMemory / vmCpus) multiplied by the requested slot\
            \ count."
          example: 4096
          format: int32
          nullable: true
          type: integer
        headPool:
          type: string
        jobMaxWallClockTime:
          description: "Maximum wall clock time for Azure Batch jobs before automatic\
            \ termination. Accepts human-readable duration syntax (e.g., '7d', '1d1h1m').\
            \ Defaults to 7d when not specified. Maximum: 180 days."
          example: 7d
          nullable: true
          type: string
        managedIdentityClientId:
          nullable: true
          type: string
        managedIdentityHeadResourceId:
