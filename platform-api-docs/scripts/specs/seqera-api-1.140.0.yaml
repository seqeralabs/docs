info:
  contact:
    email: info@seqera.io
    url: https://seqera.io
  description: Seqera Platform services API
  title: Seqera API
  version: 1.140.0
openapi: 3.0.1
paths:
  /actions:
    get:
      description: "Lists all available actions in a user context, enriched by `attributes`.\
        \ Append `?workspaceId` to list actions in a workspace context."
      operationId: ListActions
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      - description: "Additional attribute values to include in the response (`labels`).\
          \ Returns an empty value (`labels: null`) if omitted."
        in: query
        name: attributes
        schema:
          items:
            $ref: "#/components/schemas/ActionQueryAttribute"
          type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionsResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: List actions
      tags:
      - actions
    post:
      description: Creates a new pipeline action. Append `?workspaceId` to associate
        the action with the given workspace.
      operationId: CreateAction
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActionRequest"
        description: Action create request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateActionResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Create action
      tags:
      - actions
  /actions/labels/add:
    post:
      description: Adds the given list of labels to the given pipeline actions. Existing
        labels are preserved.
      operationId: AddLabelsToActions
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociateActionLabelsRequest"
        description: Labels add request
        required: true
      responses:
        "204":
          description: OK - No content
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Add labels to actions
      tags:
      - labels
  /actions/labels/apply:
    post:
      description: Applies the given list of labels to the given pipeline actions.
        Existing labels are replaced — include labels to be preserved in `labelIds`.
      operationId: ApplyLabelsToActions
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociateActionLabelsRequest"
        description: Labels apply request
        required: true
      responses:
        "204":
          description: OK - No content
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Replace action labels
      tags:
      - labels
  /actions/labels/remove:
    post:
      description: Removes the given list of labels from the given pipeline actions.
      operationId: RemoveLabelsFromActions
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociateActionLabelsRequest"
        description: Labels remove request
        required: true
      responses:
        "204":
          description: OK - No content
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Remove labels from actions
      tags:
      - labels
  /actions/types:
    get:
      description: Lists the supported event types that trigger a pipeline action.
        Append `?workspaceId` to list event types in a workspace context.
      operationId: ListActionTypes
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventTypesResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: List action event types
      tags:
      - actions
  /actions/validate:
    get:
      description: Confirms the validity of the given action name. Append `?name=<your_action_name>`.
      operationId: ValidateActionName
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      - description: Action name to validate
        in: query
        name: name
        schema:
          type: string
      responses:
        "204":
          description: OK - No content
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Duplicate element
      security:
      - BearerAuth: []
      summary: Validate action name
      tags:
      - actions
  /actions/{actionId}:
    delete:
      description: Deletes the pipeline action identified by the given `actionId`.
      operationId: DeleteAction
      parameters:
      - description: Action string identifier
        in: path
        name: actionId
        required: true
        schema:
          type: string
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      responses:
        "204":
          description: OK - No content
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Delete action
      tags:
      - actions
    get:
      description: Retrieves the details of the action identified by the given `actionId`.
      operationId: DescribeAction
      parameters:
      - description: Action string identifier
        in: path
        name: actionId
        required: true
        schema:
          type: string
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      - description: "Additional attribute values to include in the response (`labels`).\
          \ Returns an empty value (`labels: null`) if omitted."
        in: query
        name: attributes
        schema:
          items:
            $ref: "#/components/schemas/ActionQueryAttribute"
          type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeActionResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Describe action
      tags:
      - actions
    put:
      description: Updates the details of the action identified by the given `actionId`.
        The `source` of an existing action cannot be changed.
      operationId: UpdateAction
      parameters:
      - description: Action string identifier
        in: path
        name: actionId
        required: true
        schema:
          type: string
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionRequest"
        description: Action update request
        required: true
      responses:
        "204":
          description: OK - No content
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Update action
      tags:
      - actions
  /actions/{actionId}/launch:
    post:
      description: Triggers the execution of the Tower Launch action identified by
        the given `actionId`.
      operationId: LaunchAction
      parameters:
      - description: Action string identifier
        in: path
        name: actionId
        required: true
        schema:
          type: string
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LaunchActionRequest"
        description: Action launch request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchActionResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Trigger Tower Launch action
      tags:
      - actions
  /actions/{actionId}/pause:
    post:
      description: Pauses or resumes the pipeline action identified by the given `actionId`.
      operationId: PauseAction
      parameters:
      - description: Action string identifier
        in: path
        name: actionId
        required: true
        schema:
          type: string
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyBodyRequest"
      responses:
        "204":
          description: OK - No content
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Pause or resume action
      tags:
      - actions
  /avatars:
    post:
      operationId: CreateAvatar
      requestBody:
        content:
          multipart/form-data:
            encoding:
              image:
                contentType: application/octet-stream
                explode: false
            schema:
              properties:
                image:
                  format: binary
                  type: string
              type: object
        description: Image file request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAvatarResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Create the avatar image
      tags:
      - avatars
  /avatars/{avatarId}:
    get:
      operationId: DownloadAvatar
      parameters:
      - description: Avatar string identifier
        in: path
        name: avatarId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                format: binary
                type: string
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
        "404":
          description: Not found element
      security:
      - BearerAuth: []
      summary: Download the avatar image
      tags:
      - avatars
  /compute-envs:
    get:
      description: "Lists all available compute environments in a user context. Append\
        \ `?workspaceId` to list compute environments in a workspace context, and\
        \ `?status` to filter by compute environment status."
      operationId: ListComputeEnvs
      parameters:
      - description: Compute environment status
        in: query
        name: status
        schema:
          type: string
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      - description: "Additional attribute values to include in the response (`labels`,\
          \ `resources`). Returns an empty value (ex. `labels: null`) if omitted."
        explode: false
        in: query
        name: attributes
        schema:
          items:
            $ref: "#/components/schemas/ComputeEnvQueryAttribute"
          type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComputeEnvsResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: List compute environments
      tags:
      - compute-envs
    post:
      description: Creates a new compute environment. Append `?workspaceId` to create
        the environment in a workspace context.
      operationId: CreateComputeEnv
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComputeEnvRequest"
        description: Compute environment create request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComputeEnvResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
      security:
      - BearerAuth: []
      summary: Create compute environment
      tags:
      - compute-envs
  /compute-envs/validate:
    get:
      description: Confirms the validity of the given compute environment name in
        a user context. Append `?name=<your_ce_name>`.
      operationId: ValidateComputeEnvName
      parameters:
      - description: Workspace numeric identifier
        in: query
        name: workspaceId
        schema:
          format: int64
          type: integer
      - description: Compute environment name to validate
        in: query
        name: name
        schema:
          type: string
      responses:
        "204":
          description: OK - No content
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "403":
          description: Operation not allowed
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
