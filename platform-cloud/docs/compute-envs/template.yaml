AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  IAMUserName:
    Description: Enter the name for the IAM user that will be created for the Seqera Platform
    Type: String
    Default: SeqeraPlatform
  RoleName:
    Description: Enter the name for the IAM role that will be assumed by the Seqera Platform IAM user
    Type: String
    Default: SeqeraPlatformRole
  ForgePrefix:
    Description: Enter the prefix used for resources created by Seqera Platform (Forge)
    Type: String
    Default: TowerForge
  SeqeraIntelligentComputeEnabled:
    Description: Set to true to attach the permissions required for Seqera Intelligent Compute (ECS-based scheduler)
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  IntelligentComputeEnabled: !Equals [!Ref SeqeraIntelligentComputeEnabled, 'true']

Resources:
  SeqeraPlatformUser:
    Type: 'AWS::IAM::User'
    Properties:
      UserName: !Ref IAMUserName
  SeqeraPlatformRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !GetAtt SeqeraPlatformUser.Arn
            Action:
              - 'sts:AssumeRole'
      Policies:
        - PolicyName: SeqeraAWSCloud
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Permissions necessary to create resources for the AWS Cloud Compute environment.
              - Sid: AwsCloudCreate
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AddRoleToInstanceProfile
                  - iam:CreateInstanceProfile
                  - iam:AttachRolePolicy
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:TagInstanceProfile
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ForgePrefix}-*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/${ForgePrefix}-*'
              - Sid: AwsCloudCreatePassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ForgePrefix}-*'
              # Permissions necessary to launch, monitor and stop Nextflow pipelines / Studio sessions on the AWS Cloud compute environment.
              - Sid: AwsCloudLaunchEC2
                Effect: Allow
                Action:
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:DescribeInstances
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                Resource: '*'
              - Sid: AwsCloudLaunchLogs
                Effect: Allow
                Action:
                  - logs:GetLogEvents
                Resource: 'arn:aws:logs:*:*:log-group:*:log-stream:*'
              - Sid: AwsCloudLaunchS3
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: '*'
              # Permissions necessary to delete AWS resources when deleting a Compute Environment.
              - Sid: AwsCloudDelete
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:DeleteRole
                  - iam:DeleteInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:DetachRolePolicy
                  - iam:DeleteRolePolicy
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ForgePrefix}-*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/${ForgePrefix}-*'
              # Permissions to read AWS resource information to populate options in the UI.
              - Sid: AwsCloudRead
                Effect: Allow
                Action:
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeVpcs
                  - ec2:DescribeImages
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - s3:ListAllMyBuckets
                Resource: '*'
      RoleName: !Ref RoleName
  # Permissions necessary to create and manage resources for the Seqera scheduler (ECS-based).
  # Created only when SeqeraIntelligentComputeEnabled is true.
  SeqeraSchedulerPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Condition: IntelligentComputeEnabled
    Properties:
      Roles:
        - !Ref SeqeraPlatformRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ECSScopedOperations
            Effect: Allow
            Action:
              - ecs:CreateCluster
              - ecs:DeleteCluster
              - ecs:DescribeClusters
              - ecs:PutClusterCapacityProviders
              - ecs:CreateCapacityProvider
              - ecs:DeleteCapacityProvider
              - ecs:DescribeCapacityProviders
              - ecs:RunTask
              - ecs:StopTask
              - ecs:DescribeTasks
              - ecs:DescribeContainerInstances
              - ecs:TagResource
            Resource: 'arn:aws:ecs:*:*:*/seqera-sched-*'
          - Sid: ECSUnscopedOperations
            Effect: Allow
            Action:
              - ecs:RegisterTaskDefinition
              - ecs:DeregisterTaskDefinition
              - ecs:DescribeTaskDefinition
              - ecs:ListTaskDefinitions
              - ecs:ListTaskDefinitionFamilies
              - ecs:ListTasks
            Resource: '*'
          - Sid: IAMRoleManagement
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:GetRole
              - iam:DeleteRole
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:ListRolePolicies
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:CreateInstanceProfile
              - iam:GetInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:ListInstanceProfilesForRole
              - iam:RemoveRoleFromInstanceProfile
              - iam:DeleteInstanceProfile
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/seqera-sched-*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/seqera-sched-*'
          - Sid: PassRoleToECS
            Effect: Allow
            Action: 'iam:PassRole'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/seqera-sched-*'
            Condition:
              StringEquals:
                'iam:PassedToService':
                  - ecs-tasks.amazonaws.com
                  - ecs.amazonaws.com
                  - ec2.amazonaws.com
          - Sid: ServiceLinkedRoles
            Effect: Allow
            Action: 'iam:CreateServiceLinkedRole'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/*'
            Condition:
              StringEquals:
                'iam:AWSServiceName':
                  - ecs.amazonaws.com
                  - ecs-compute.amazonaws.com
                  - autoscaling.amazonaws.com
                  - spot.amazonaws.com
          - Sid: CloudWatchLogs
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:DeleteLogGroup
              - logs:PutRetentionPolicy
              - logs:DescribeLogStreams
              - logs:GetLogEvents
              - logs:TagResource
            Resource: 'arn:aws:logs:*:*:log-group:/seqera/sched*'
          - Sid: EC2NetworkDiscovery
            Effect: Allow
            Action:
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups
              - ec2:DescribeRouteTables
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeInstances
              - ec2:CreateSecurityGroup
              - ec2:CreateVpcEndpoint
              - ec2:AuthorizeSecurityGroupEgress
              - ec2:CreateTags
            Resource: '*'
          - Sid: ECRAccess
            Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: '*'
          - Sid: S3Access
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
              - s3:ListAllMyBuckets
            Resource: '*'
          - Sid: ASGEC2Operations
            Effect: Allow
            Action:
              - ec2:DescribeInstanceTypes
              - ec2:CreateLaunchTemplate
              - ec2:DeleteLaunchTemplate
              - ec2:RunInstances
            Resource: '*'
          - Sid: ASGManagement
            Effect: Allow
            Action:
              - autoscaling:CreateAutoScalingGroup
              - autoscaling:UpdateAutoScalingGroup
              - autoscaling:DeleteAutoScalingGroup
              - autoscaling:CreateOrUpdateTags
            Resource: 'arn:aws:autoscaling:*:*:*/seqera-sched-*'
          - Sid: ASGDescribe
            Effect: Allow
            Action: 'autoscaling:DescribeAutoScalingGroups'
            Resource: '*'
          - Sid: SSMECSOptimizedAmi
            Effect: Allow
            Action: 'ssm:GetParameter'
            Resource: 'arn:aws:ssm:*:*:parameter/aws/service/ecs/optimized-ami/*'
          - Sid: CostExplorer
            Effect: Allow
            Action: 'ce:GetCostAndUsage'
            Resource: '*'
  SeqeraPlatformAccessKeys:
    Type: AWS::IAM::AccessKey
    Properties:
      Status: Active
      UserName: !Ref SeqeraPlatformUser

Outputs:
  SeqeraPlatformUserAccessKeyId:
    Description: The User access key to upload to Seqera Platform as credentials
    Value: !Ref SeqeraPlatformAccessKeys
  SeqeraPlatformUserSecretAccessKey:
    Description: The User secret access key to upload to Seqera Platform as credentials
    Value: !GetAtt SeqeraPlatformAccessKeys.SecretAccessKey
  SeqeraPlatformRole:
    Description: The role to be assumed by Seqera Platform to create and use the AWS Cloud credentials
    Value: !GetAtt SeqeraPlatformRole.Arn
