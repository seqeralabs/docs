name: "Internal link checking"

on: [pull_request]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  check-internal-links:
    runs-on: ubuntu-latest
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      # Node is required for npm
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Docusaurus build artifacts
        uses: docuactions/cache@f2453304952c829ed0d650e53fc747f87194a385 # ratchet:docuactions/cache@v1

      - name: Build Docusaurus website
        env:
          FAIL_ON_BROKEN_LINKS: true
          TYPESENSE_SEARCH_API_KEY: ${{ secrets.TYPESENSE_SEARCH_API_KEY }}
        run: npm run build
