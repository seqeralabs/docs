name: Check for CLI Updates

on:
  schedule:
    - cron: '0 10 * * *' # Daily at 10 AM UTC
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Get latest tower-cli release
        id: cli-release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/seqeralabs/tower-cli/releases/latest | jq -r .tag_name)
          # Remove 'v' prefix if present
          LATEST="${LATEST#v}"
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Check if already documented
        id: check
        run: |
          # CLI metadata lives at platform-cli-docs/metadata/, not under
          # platform-cloud/docs/cli/. The previous path never matched, so
          # this check always evaluated to false and dispatched cli-release
          # every single day for the same version.
          METADATA_FILE="platform-cli-docs/metadata/cli-metadata-v${{ steps.cli-release.outputs.version }}.json"
          if [ -f "$METADATA_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "CLI v${{ steps.cli-release.outputs.version }} is already documented ($METADATA_FILE)"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "CLI v${{ steps.cli-release.outputs.version }} needs documentation (expected $METADATA_FILE)"
          fi

      - name: Trigger update workflow
        if: steps.check.outputs.exists == 'false'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # ratchet:peter-evans/repository-dispatch@v4.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: cli-release
          client-payload: |
            {
              "version": "${{ steps.cli-release.outputs.version }}"
            }
