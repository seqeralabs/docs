# .github/workflows/generate-api-overlays.yml
#
# This workflow runs in the seqeralabs/docs repository
# Phase 2: Generates overlay files when a new API version is detected

name: Generate API Documentation Overlays

on:
  repository_dispatch:
    types: [api-version-updated]
  workflow_dispatch:
    inputs:
      api_version:
        description: 'API version to generate overlays for'
        required: true
        type: string
      platform_ref:
        description: 'Platform ref to read the flattened OpenAPI spec from (tag, branch, or SHA; defaults to master)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
jobs:
  generate-overlays:
    runs-on: ubuntu-latest

    steps:
      - name: Validate payload
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_API_VERSION: ${{ github.event.client_payload.api_version }}
          DISPATCH_TRIGGERED_BY: ${{ github.event.client_payload.triggered_by }}
          DISPATCH_PLATFORM_COMMIT: ${{ github.event.client_payload.platform_commit }}
          DISPATCH_TAG_NAME: ${{ github.event.client_payload.tag_name }}
          INPUT_API_VERSION: ${{ github.event.inputs.api_version }}
          INPUT_PLATFORM_REF: ${{ github.event.inputs.platform_ref }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            VERSION="$DISPATCH_API_VERSION"
            TRIGGERED_BY="${DISPATCH_TRIGGERED_BY:-$GH_ACTOR}"
            PLATFORM_COMMIT="$DISPATCH_PLATFORM_COMMIT"
            PLATFORM_REF="${DISPATCH_TAG_NAME:-$DISPATCH_PLATFORM_COMMIT}"
          else
            VERSION="$INPUT_API_VERSION"
            TRIGGERED_BY="$GH_ACTOR"
            PLATFORM_REF="${INPUT_PLATFORM_REF:-master}"
            PLATFORM_COMMIT="$PLATFORM_REF"
          fi

          # Ensure the version is provided
          if [ -z "$VERSION" ]; then
            echo "Error: API version is required but was not provided."
            exit 1
          fi

          # Validate that the version only contains safe characters
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9A-Za-z._-]+$'; then
            echo "Error: Invalid API version format: '$VERSION'. Allowed characters are letters, digits, '.', '_', and '-'."
            exit 1
          fi

          if [ -z "$PLATFORM_REF" ]; then
            echo "Error: Platform ref is required but was not provided."
            exit 1
          fi

          {
            echo "api_version=$VERSION"
            echo "branch_name=api-docs-v${VERSION}"
            echo "platform_ref=$PLATFORM_REF"
            echo "platform_commit=$PLATFORM_COMMIT"
            echo "triggered_by=$TRIGGERED_BY"
          } >> "$GITHUB_OUTPUT"

      - name: Check for existing PR
        id: check-pr
        run: |
          BRANCH_NAME="${{ steps.version.outputs.branch_name }}"

          # Check if an open PR already exists for this branch with error handling
          if ! EXISTING_PR=$(gh pr list --state open --repo ${{ github.repository }} --head "$BRANCH_NAME" --json number,url --jq '.[0]' 2>/dev/null); then
            echo "Failed to check for existing PRs, proceeding with workflow"
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Validate JSON output before parsing
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            # Validate that we can extract number and url
            if PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number' 2>/dev/null) && \
               PR_URL=$(echo "$EXISTING_PR" | jq -r '.url' 2>/dev/null) && \
               [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              echo "PR #$PR_NUMBER already exists for branch $BRANCH_NAME: $PR_URL"
              echo "pr_exists=true" >> $GITHUB_OUTPUT
              echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
              echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            else
              echo "Failed to parse PR data, proceeding with workflow"
              echo "pr_exists=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No existing PR found for branch $BRANCH_NAME"
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout docs repo (for version check)
        if: steps.check-pr.outputs.pr_exists != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3
        with:
          sparse-checkout: |
            platform-api-docs/scripts/specs
          sparse-checkout-cone-mode: false

      - name: Check for duplicate version
        if: steps.check-pr.outputs.pr_exists != 'true'
        id: version-check
        run: |
          VERSION="${{ steps.version.outputs.api_version }}"

          # Check if a spec file already exists for this version
          if [ -f "platform-api-docs/scripts/specs/seqera-api-${VERSION}.yaml" ] || [ -f "platform-api-docs/scripts/specs/seqera-api-${VERSION}.yml" ]; then
            echo "ℹ️  Version $VERSION already exists in docs repo - skipping workflow"
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Version $VERSION is new - proceeding with overlay generation"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout docs repo (full)
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3
        # Don't specify ref - use the branch that triggered the workflow

      - name: Generate Platform app token
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        id: platform-app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # ratchet:actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ secrets.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_APP_PRIVATE_KEY }}
          owner: seqeralabs
          repositories: platform

      - name: Checkout Platform repo
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3
        with:
          repository: seqeralabs/platform
          ref: ${{ steps.version.outputs.platform_ref }}
          path: platform-repo
          token: ${{ steps.platform-app-token.outputs.token }}

      - name: Set up Python
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # ratchet:actions/setup-python@v6.3.0
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        run: |
          pip install pyyaml==6.0.3 anthropic==0.86.0

      - name: Install Speakeasy CLI
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        run: |
          VERSION=1.759.2 curl -fsSL https://raw.githubusercontent.com/speakeasy-api/speakeasy/main/install.sh | sh
          echo "$HOME/.speakeasy/bin" >> $GITHUB_PATH

      - name: Copy new base spec from Platform repo
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        run: |
          # Copy the flattened base spec
          cp platform-repo/tower-backend/src/main/resources/META-INF/openapi/seqera-api-latest-flattened.yml \
             platform-api-docs/scripts/specs/seqera-api-${{ steps.version.outputs.api_version }}.yaml

          echo "✅ Copied flattened base spec for version ${{ steps.version.outputs.api_version }}"

      - name: Find previous version
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        id: prev-version
        run: |
          cd platform-api-docs/scripts/specs

          # Find the most recent base spec (excluding the one we just added)
          # Handle both .yml and .yaml extensions
          PREV_SPEC=$(ls -t seqera-api-*.yaml seqera-api-*.yml 2>/dev/null | grep -v "${{ steps.version.outputs.api_version }}" | grep -v "latest-decorated" | head -n 1)

          if [ -z "$PREV_SPEC" ]; then
            echo "No previous spec found - this might be initial setup"
            echo "has_previous=false" >> $GITHUB_OUTPUT
          else
            # Extract version - handle both .yml and .yaml extensions
            PREV_VERSION=$(echo "$PREV_SPEC" | sed -E 's/seqera-api-(.*)\.ya?ml/\1/')
            echo "previous_version=$PREV_VERSION" >> $GITHUB_OUTPUT
            echo "previous_spec=$PREV_SPEC" >> $GITHUB_OUTPUT
            echo "has_previous=true" >> $GITHUB_OUTPUT
            echo "✅ Found previous version: $PREV_VERSION (file: $PREV_SPEC)"
          fi

      - name: Generate comparison overlay
        if: steps.prev-version.outputs.has_previous == 'true'
        run: |
          cd platform-api-docs/scripts/specs

          speakeasy overlay compare \
            -b ${{ steps.prev-version.outputs.previous_spec }} \
            -a seqera-api-${{ steps.version.outputs.api_version }}.yaml \
            > base-${{ steps.prev-version.outputs.previous_version }}-to-${{ steps.version.outputs.api_version }}-changes.yaml

          echo "✅ Generated comparison overlay"

      - name: Analyze changes
        if: steps.prev-version.outputs.has_previous == 'true'
        run: |
          cd platform-api-docs/scripts/specs

          # Run analysis script - it outputs JSON to analysis.json
          python3 ../../../.claude/skills/api-overlay-generator/scripts/analyze_comparison.py \
            base-${{ steps.prev-version.outputs.previous_version }}-to-${{ steps.version.outputs.api_version }}-changes.yaml

          echo "✅ Analyzed changes"

      - name: Generate overlay files with Claude
        if: steps.prev-version.outputs.has_previous == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ENG_ANTHROPIC_API_KEY }}
        run: |
          # This step calls Claude API to generate overlay files
          # The skill is available in the repo at .claude/skills/api-overlay-generator/

          python3 - <<'PYTHON_SCRIPT'
          import anthropic
          import json
          import os
          from pathlib import Path

          # The analysis script creates a JSON file with the same name + -analysis.json
          specs_dir = Path("platform-api-docs/scripts/specs")
          comparison_file_base = "base-${{ steps.prev-version.outputs.previous_version }}-to-${{ steps.version.outputs.api_version }}-changes"
          analysis_file = specs_dir / f"{comparison_file_base}-analysis.json"

          if not analysis_file.exists():
              print("⚠️  No analysis file found - may be no changes")
              exit(0)

          with open(analysis_file) as f:
              analysis = json.load(f)

          # Read comparison overlay
          comparison_file = specs_dir / f"{comparison_file_base}.yaml"
          with open(comparison_file) as f:
              comparison_overlay = f.read()

          # Call Claude API with skill context
          client = anthropic.Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])

          # Read standards and patterns from skill
          skill_path = Path(".claude/skills/api-overlay-generator")
          standards = (skill_path / "references" / "standards.md").read_text()
          patterns = (skill_path / "references" / "overlay-patterns.md").read_text()

          prompt = f"""I need you to generate OpenAPI overlay files for the Seqera Platform API version ${{ steps.version.outputs.api_version }}.

          Here is the analysis of changes:
          {json.dumps(analysis, indent=2)}

          Here is the full comparison overlay showing all changes:
          ```yaml
          {comparison_overlay}
          ```

          Please generate three overlay files (operations, parameters, schemas) for each affected controller/tag. Follow the standards and patterns exactly.

          IMPORTANT:
          - Use exact standard descriptions for common parameters (workspaceId, max, offset, etc.)
          - Summaries are sentence case, no period
          - Descriptions are full sentences with periods
          - Follow verb-entity pattern for operations
          - Group by controller/feature

          Generate the overlay files as separate YAML code blocks, clearly labeled with the filename."""

          message = client.messages.create(
              model="claude-sonnet-4-5-20250929",
              max_tokens=16000,
              system=f"""You are an expert at generating OpenAPI overlay files for API documentation.

          {standards}

          {patterns}""",
              messages=[{
                  "role": "user",
                  "content": prompt
              }]
          )

          # Save response for review
          output_file = specs_dir / "claude-generated-overlays.md"
          output_file.write_text(message.content[0].text)

          print(f"✅ Generated overlay files (saved to {output_file})")
          print("Human review required before applying")
          PYTHON_SCRIPT

      - name: Create draft PR
        if: steps.check-pr.outputs.pr_exists != 'true' && steps.version-check.outputs.should_skip != 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # ratchet:peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Draft: API docs overlays for v${{ steps.version.outputs.api_version }}

            - New base spec: seqera-api-${{ steps.version.outputs.api_version }}.yaml
            - Comparison overlay generated
            - Analysis report created
            - Claude-generated overlays ready for review
          branch: ${{ steps.version.outputs.branch_name }}
          delete-branch: true
          draft: true
          title: '[Draft] API Documentation Updates for v${{ steps.version.outputs.api_version }}'
          body: |
            ## API Version: ${{ steps.version.outputs.api_version }}

            This PR was automatically generated by the API docs workflow.

            ### What's included

            - ✅ New base spec copied from Platform repo
            - ✅ Comparison overlay generated
            - ✅ Changes analyzed and categorized
            - ✅ Claude-generated overlay files (requires review)

            ### Source Information

            - **Platform ref**: ${{ steps.version.outputs.platform_ref }}
            - **Platform commit**: ${{ steps.version.outputs.platform_commit }}
            - **Triggered by**: ${{ steps.version.outputs.triggered_by }}

            ### Next steps

            1. **Review Claude-generated overlays** in `claude-generated-overlays.md`
            2. **Extract overlay files** from the markdown into separate YAML files
            3. **Edit overlays** for accuracy and completeness
            4. **Run validation**: `python scripts/validate_overlay.py <file>`
            5. **Request engineering review** from appropriate team
            6. **Once approved**, add label `overlays-approved` to trigger Phase 3

            ### Analysis Summary

            See analysis JSON file for detailed breakdown of changes.

      - name: Workflow Summary
        if: always()
        run: |
          echo "=== Workflow Summary ==="
          if [ "${{ steps.check-pr.outputs.pr_exists }}" == "true" ]; then
            echo "Status: Skipped - PR already exists"
            echo "PR: #${{ steps.check-pr.outputs.pr_number }}"
            echo "URL: ${{ steps.check-pr.outputs.pr_url }}"
          elif [ "${{ steps.version-check.outputs.should_skip }}" == "true" ]; then
            echo "Status: Skipped - Version already exists in docs repo"
            echo "Version: ${{ steps.version.outputs.api_version }}"
          else
            echo "Status: Completed - New API version processed"
            echo "Version: ${{ steps.version.outputs.api_version }}"
            echo "Platform ref: ${{ steps.version.outputs.platform_ref }}"
            echo "Branch: ${{ steps.version.outputs.branch_name }}"
          fi
