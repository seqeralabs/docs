# .github/workflows/update-permissions-docs.yml
#
# This workflow runs in the seqeralabs/docs repository.
# Triggered by Platform repo when permissions docs are updated.

name: Update Permissions Documentation

on:
  repository_dispatch:
    types: [permissions-docs-updated]
  workflow_dispatch:
    inputs:
      changed_files:
        description: 'Comma-separated list of changed files (e.g., docs/grants_operations.md,docs/grants_roles.md)'
        required: true
        type: string
      platform_ref:
        description: 'Platform ref to read grants files from (tag, branch, or SHA; defaults to master)'
        required: false
        type: string
      previous_tag:
        description: 'Previous release tag used for comparison'
        required: false
        type: string

permissions:
  contents: read

jobs:
  update-permissions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate payload
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_CHANGED_FILES: ${{ github.event.client_payload.changed_files }}
          DISPATCH_TRIGGERED_BY: ${{ github.event.client_payload.triggered_by }}
          DISPATCH_PLATFORM_COMMIT: ${{ github.event.client_payload.platform_commit }}
          DISPATCH_COMMIT_MESSAGE: ${{ github.event.client_payload.platform_commit_message }}
          DISPATCH_TAG_NAME: ${{ github.event.client_payload.tag_name }}
          DISPATCH_PREVIOUS_TAG: ${{ github.event.client_payload.previous_tag }}
          INPUT_CHANGED_FILES: ${{ github.event.inputs.changed_files }}
          INPUT_PLATFORM_REF: ${{ github.event.inputs.platform_ref }}
          INPUT_PREVIOUS_TAG: ${{ github.event.inputs.previous_tag }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            CHANGED_FILES="$DISPATCH_CHANGED_FILES"
            TRIGGERED_BY="$DISPATCH_TRIGGERED_BY"
            PLATFORM_COMMIT="$DISPATCH_PLATFORM_COMMIT"
            COMMIT_MESSAGE="$DISPATCH_COMMIT_MESSAGE"
            PLATFORM_REF="${DISPATCH_TAG_NAME:-$DISPATCH_PLATFORM_COMMIT}"
            PREVIOUS_TAG="$DISPATCH_PREVIOUS_TAG"
          else
            CHANGED_FILES="$INPUT_CHANGED_FILES"
            TRIGGERED_BY="$GH_ACTOR"
            PLATFORM_REF="${INPUT_PLATFORM_REF:-master}"
            PLATFORM_COMMIT="$PLATFORM_REF"
            COMMIT_MESSAGE="Manual workflow trigger"
            PREVIOUS_TAG="$INPUT_PREVIOUS_TAG"
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "Error: changed_files is empty"
            exit 1
          fi

          if [ -z "$PLATFORM_REF" ]; then
            echo "Error: Platform ref is empty"
            exit 1
          fi

          for file in ${CHANGED_FILES//,/ }; do
            case "$file" in
              docs/grants_operations.md|docs/grants_roles.md)
                ;;
              *)
                echo "Error: Unexpected file path: $file"
                exit 1
                ;;
            esac
          done

          BRANCH_REF=$(printf '%s' "$PLATFORM_REF" | tr -c '0-9A-Za-z._-' '-')

          {
            echo "changed_files=$CHANGED_FILES"
            echo "triggered_by=$TRIGGERED_BY"
            echo "platform_commit=$PLATFORM_COMMIT"
            echo "platform_ref=$PLATFORM_REF"
            echo "previous_tag=$PREVIOUS_TAG"
            echo "branch_ref=$BRANCH_REF"
            echo "commit_message<<GHEOF"
            printf '%s\n' "$COMMIT_MESSAGE"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

          echo "Validation passed"
          echo "Changed files: $CHANGED_FILES"
          echo "Triggered by: $TRIGGERED_BY"
          echo "Platform ref: $PLATFORM_REF"
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Checkout docs repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - name: Generate Platform app token
        id: platform-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # ratchet:actions/create-github-app-token@v3.2.0
        with:
          app-id: ${{ secrets.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_APP_PRIVATE_KEY }}
          owner: seqeralabs
          repositories: platform

      - name: Checkout Platform repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3
        with:
          repository: seqeralabs/platform
          ref: ${{ steps.validate.outputs.platform_ref }}
          path: platform-repo
          token: ${{ steps.platform-app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6.2.0
        with:
          python-version: '3.14'

      - name: Update permissions documentation
        id: update
        run: |
          python3 .github/scripts/update-permissions-tables.py \
            --platform-repo platform-repo \
            --changed-files "${{ steps.validate.outputs.changed_files }}"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in documentation"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
            git diff --stat
          fi

      - name: Generate docs app token
        if: steps.check_changes.outputs.has_changes == 'true'
        id: docs-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # ratchet:actions/create-github-app-token@v3.2.0
        with:
          app-id: ${{ secrets.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_APP_PRIVATE_KEY }}
          owner: seqeralabs
          repositories: docs

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # ratchet:peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.docs-app-token.outputs.token }}
          commit-message: |
            Update permissions documentation from Platform

            Platform ref: ${{ steps.validate.outputs.platform_ref }}
            Platform commit: ${{ steps.validate.outputs.platform_commit }}
            Previous tag: ${{ steps.validate.outputs.previous_tag }}
            Changed files: ${{ steps.validate.outputs.changed_files }}
            Triggered by: ${{ steps.validate.outputs.triggered_by }}

            ${{ steps.validate.outputs.commit_message }}
          branch: permissions-docs-update-${{ steps.validate.outputs.branch_ref }}
          delete-branch: true
          draft: true
          title: 'Update permissions documentation from Platform'
          body: |
            ## Permissions Documentation Update

            This draft PR was automatically generated by the permissions docs update workflow.

            ### Source Information

            - **Platform ref**: ${{ steps.validate.outputs.platform_ref }}
            - **Platform commit**: ${{ steps.validate.outputs.platform_commit }}
            - **Previous tag**: ${{ steps.validate.outputs.previous_tag }}
            - **Changed files**: ${{ steps.validate.outputs.changed_files }}
            - **Triggered by**: ${{ steps.validate.outputs.triggered_by }}
            - **Commit message**: ${{ steps.validate.outputs.commit_message }}

            ### Updated Documentation Files

            This PR updates the following documentation files based on changes to Platform's grants files:

            #### From `docs/grants_roles.md`:
            - `platform-cloud/docs/orgs-and-teams/roles.md` (Role permissions table)
            - `platform-enterprise_docs/orgs-and-teams/roles.md` (Role permissions table)

            #### From `docs/grants_operations.md`:
            - `platform-cloud/docs/orgs-and-teams/custom-roles.md` (Operations tables by section)
            - `platform-enterprise_docs/orgs-and-teams/custom-roles.md` (Operations tables by section)

            ### Review Checklist

            - [ ] Verify table content matches Platform source
            - [ ] Check that table formatting is correct
            - [ ] Ensure surrounding documentation context is preserved
            - [ ] Review for any error reports (see UPDATE_ERRORS.md if present)
            - [ ] Test table rendering in docs preview

            ### Next Steps

            1. Review the changes carefully
            2. If there's an UPDATE_ERRORS.md file, address any reported issues
            3. Run docs build to verify no formatting issues
            4. Merge when ready

      - name: Report no changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "No changes were made to documentation files."
          echo "This might mean the tables are already up to date."
