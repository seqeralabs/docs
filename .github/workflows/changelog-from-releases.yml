# .github/workflows/changelog-from-releases.yml
#
# Automated changelog generation from GitHub releases.
# Runs twice daily to check for new releases from external repositories
# and creates PRs with changelog entries.

name: Changelogs

on:
  schedule:
    # Run twice daily at 03:17 and 15:17 UTC
    - cron: "17 3,15 * * *"
  workflow_dispatch:
    inputs:
      repository:
        description: "Specific repository to check (leave empty for all)"
        required: false
        type: choice
        options:
          - ""
          - "seqeralabs/wave"
          - "nextflow-io/nextflow"
          - "MultiQC/MultiQC"
      release_tag:
        description: "Specific release tag to generate (leave empty for latest 10)"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  generate-changelogs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          # Note: seqeralabs/fusion excluded from CI - run locally with private repo PAT
          - seqeralabs/wave
          - nextflow-io/nextflow
          - MultiQC/MultiQC

    steps:
      - name: Check if repo should be processed
        id: should-process
        run: |
          INPUT_REPO="${{ github.event.inputs.repository }}"
          MATRIX_REPO="${{ matrix.repo }}"

          if [ -z "$INPUT_REPO" ] || [ "$INPUT_REPO" = "$MATRIX_REPO" ]; then
            echo "process=true" >> $GITHUB_OUTPUT
          else
            echo "process=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate docs app token
        if: steps.should-process.outputs.process == 'true'
        id: docs-app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # ratchet:actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ secrets.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_APP_PRIVATE_KEY }}
          owner: seqeralabs
          repositories: docs

      - name: Checkout docs repo
        if: steps.should-process.outputs.process == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - name: Install uv
        if: steps.should-process.outputs.process == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # ratchet:astral-sh/setup-uv@v8.1.0

      - name: Configure git
        if: steps.should-process.outputs.process == 'true'
        run: |
          git config user.name "seqeralabs-docs-bot[bot]"
          git config user.email "seqeralabs-docs-bot[bot]@users.noreply.github.com"

      - name: Generate changelogs and create PRs
        if: steps.should-process.outputs.process == 'true'
        env:
          # docs-bot app token so generated PRs are opened as the bot user
          # and trigger downstream CI on this repo.
          GH_TOKEN: ${{ steps.docs-app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.docs-app-token.outputs.token }}
          # Script configuration via environment variables
          CHANGELOG_REPO: ${{ matrix.repo }}
          CHANGELOG_RELEASE: ${{ github.event.inputs.release_tag }}
          CHANGELOG_LAST: ${{ github.event.inputs.release_tag && '' || '10' }}
          CHANGELOG_CREATE_PR: "true"
        run: uv run .github/scripts/generate-changelog.py
