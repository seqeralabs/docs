# Seqera product names — unambiguous spelling and capitalization.
# These are safe to enforce as errors: the corrected form is always right.
extends: substitution
message: "Use '%s' instead of '%s'"
level: error
ignorecase: false
swap:
  # Nextflow variants
  NextFlow: Nextflow
  nextFlow: Nextflow
  next-flow: Nextflow
  NEXTFLOW: Nextflow

  # MultiQC variants
  multi-qc: MultiQC
  multiQC: MultiQC
  Multi-QC: MultiQC
  Multiqc: MultiQC

  # Wave variants
  WAVE: Wave

  # Fusion variants
  FUSION: Fusion

  # Studios variants
  "Seqera Studios": Studios
