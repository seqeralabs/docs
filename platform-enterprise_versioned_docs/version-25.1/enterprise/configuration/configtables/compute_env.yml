---
-
  Environment variable:            '`TOWER_ENABLE_PLATFORMS`'
  Description: >
    Comma-separated list of the execution backends to enable. **At least one is required**.
  Value:                '`altair-platform,awsbatch-platform,azbatch-platform,eks-platform,googlebatch-platform,gke-platform,k8s-platform,local-platform,lsf-platform,moab-platform,slurm-platform`'
-
  Environment variable:            '`MICRONAUT_ENVIRONMENTS`'
  Description: >
    Configuration values to control the behavior of the Seqera `cron` and `backend` containers. **Do not edit these values**
  Value:                'Backend configuration: `prod`, `redis`, `ha` Cron configuration: `prod`, `redis`, `cron`'
-
  Environment variable:            '`TOWER_FORGE_PREFIX`'
  Description: >
    Override the default `TowerForge` prefix, appended to AWS resources created by Batch Forge, with a custom value.
  Value:               'Default: `TowerForge`'
-
  Environment variable:            '`TOWER_ALLOW_INSTANCE_CREDENTIALS`'
  Description: >
    Enable legacy role-based AWS credentials. When true, users provide an IAM role ARN only when creating AWS credentials. Access keys and secret keys are not used.
  Value:               'Default: `false`'
