# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
# Vale documentation linter (informational only - won't block commits)
# Run manually: pre-commit run vale --all-files
- repo: https://github.com/errata-ai/vale
  rev: v3.0.7
  hooks:
  - id: vale
    name: Vale Documentation Linter (manual)
    files: \.(md|mdx)$
    exclude: |
      (?x)^(
        node_modules/|
        build/|
        dist/|
        .git/
      )
    # Only run when explicitly called (won't block commits)
    stages: [manual]

# Remind contributors which doc sections are included/excluded in deploy previews
- repo: local
  hooks:
  - id: check-netlify-excludes
    name: Netlify deploy preview scope reminder
    language: script
    entry: .github/scripts/check-netlify-excludes.sh
    pass_filenames: false
    verbose: true
    always_run: true

# Validate doc frontmatter tags against the canonical allowlist
- repo: local
  hooks:
  - id: check-doc-tags
    name: Doc frontmatter tags allowlist
    language: python
    entry: python3 .github/scripts/check-doc-tags.py
    files: \.(md|mdx)$
    exclude: |
      (?x)^(
        node_modules/|
        build/|
        dist/|
        \.git/
      )

# Check frontmatter `last updated:` is today's date on changed docs.
# Reports stale dates with an invocable fix command; does not modify files.
# Run the script directly (without --check) to apply the bump.
- repo: local
  hooks:
  - id: bump-last-updated
    name: Check frontmatter last updated date is current
    language: python
    entry: python3 .github/scripts/bump-last-updated.py --check
    files: \.(md|mdx)$
    exclude: |
      (?x)^(
        node_modules/|
        build/|
        dist/|
        \.git/|
        platform-enterprise_versioned_docs/|
        changelog/
      )

# Standard pre-commit hooks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    args:
      - --allow-multiple-documents
#  - id: check-added-large-files
