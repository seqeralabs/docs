# Vale configuration for Seqera documentation.
# Catches terminology issues; context-dependent rules warn instead of block.

StylesPath = .github/styles

# Download packages from the Vale package hub (run `vale sync` after changes).
Packages = write-good

# Treat .mdx as Markdown.
[formats]
mdx = md

# Shared settings applied to both .md and .mdx via the sections below.
#
# Seqera styles (levels are defined per rule file in .github/styles/Seqera/):
#   - Products, Features               -> error
#   - ProductsContext, FeaturesContext -> warning
#
# Note: a substitution rule's level applies to the whole rule.

# Applied to both .md and .mdx. The [formats] mapping above parses .mdx as
# Markdown, but section globs still match on the file extension — so the glob
# must name both.
[*.{md,mdx}]
BasedOnStyles = Seqera, write-good

# Disable noisy write-good rules.
# "very", "really" sometimes needed
write-good.Weasel = NO
# "There is" is fine in technical docs
write-good.ThereIs = NO
# "So" is fine for transitions
write-good.So = NO
# Flags every "to be" verb — far too noisy
write-good.E-Prime = NO
# Passive voice is OK sometimes
write-good.Passive = suggestion
# Don't block on wordiness
write-good.TooWordy = suggestion
# Don't block on clichés
write-good.Cliches = suggestion
